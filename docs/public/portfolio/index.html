<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>持仓分析仪表盘 - AI Learning Path</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--fg:#e6edf3;--fg2:#8b949e;--fg3:#484f58;--border:#30363d;--green:#3fb950;--red:#f85149;--yellow:#d29922;--blue:#58a6ff;--radius:12px}
@media(prefers-color-scheme:light){:root{--bg:#fff;--bg2:#f6f8fa;--bg3:#eaeef2;--fg:#1f2328;--fg2:#656d76;--fg3:#8b949e;--border:#d0d7de}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--fg);line-height:1.5}
a{color:var(--blue);text-decoration:none}
.dash{max-width:1200px;margin:0 auto;padding:32px 24px 80px}
.dash h1{text-align:center;font-size:2em;margin-bottom:6px}
.meta{text-align:center;color:var(--fg3);font-size:13px;margin-bottom:28px}
.meta .time{color:var(--blue);font-weight:600}

/* 总览区 */
.total-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px}
.tb{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 16px;text-align:center}
.tb .l{font-size:12px;color:var(--fg3);margin-bottom:6px}
.tb .v{font-size:1.6em;font-weight:800;letter-spacing:-.02em}
.tb .v.small{font-size:1.2em}
.green{color:var(--green)}.red{color:var(--red)}.yellow{color:var(--yellow)}.blue{color:var(--blue)}

/* 情绪概览 */
.sentiment-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:32px}
.sb{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.sb .l{font-size:12px;color:var(--fg3);margin-bottom:4px}
.sb .v{font-size:1.5em;font-weight:800}

/* 卡片网格 */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:18px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.1)}

.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sname{font-size:15px;font-weight:700;display:block}
.scode{font-size:12px;color:var(--fg3)}
.score{text-align:center;padding:6px 14px;border:2px solid;border-radius:10px;min-width:66px}
.score .num{font-size:22px;font-weight:800;line-height:1.2}
.score .lbl{font-size:10px;opacity:.75}

/* 行情行 */
.price-row{display:flex;justify-content:space-between;align-items:baseline;padding:10px 14px;background:var(--bg3);border-radius:10px;margin-bottom:10px}
.price-row .p{font-size:22px;font-weight:700}
.price-row .chg{font-size:14px;font-weight:600}
.price-row .mv{font-size:11px;color:var(--fg3)}
.up{color:var(--green)}.down{color:var(--red)}

/* 建议 */
.advice{padding:7px 14px;border-left:4px solid;border-radius:0 8px 8px 0;font-weight:700;font-size:14px;margin-bottom:10px}

/* 价格三格 */
.prices{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.pi{text-align:center;padding:8px 4px;background:var(--bg3);border-radius:8px}
.pi .l{font-size:10px;color:var(--fg3);display:block;margin-bottom:2px}
.pi .v{font-size:13px;font-weight:700}

/* 分析摘要 - 可展开 */
.summary-wrap{margin-bottom:8px}
.summary-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--fg3);cursor:pointer;padding:6px 0;user-select:none;border:none;background:none}
.summary-toggle:hover{color:var(--fg2)}
.summary-toggle .arrow{display:inline-block;transition:transform .2s;font-size:10px}
.summary-toggle.open .arrow{transform:rotate(90deg)}
.summary-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.summary-body.open{max-height:500px;overflow-y:auto}
.summary-body .inner{font-size:13px;color:var(--fg2);line-height:1.7;padding:10px 12px;background:var(--bg3);border-radius:8px}

/* 自定义滚动条 */
.summary-body::-webkit-scrollbar{width:5px}
.summary-body::-webkit-scrollbar-track{background:transparent;border-radius:3px}
.summary-body::-webkit-scrollbar-thumb{background:var(--fg3);border-radius:3px}
.summary-body::-webkit-scrollbar-thumb:hover{background:var(--fg2)}

.card .ts{font-size:10px;color:var(--fg3);text-align:right}

.loading,.error{text-align:center;padding:64px;color:var(--fg2)}
.error button{margin-top:12px;padding:8px 20px;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px}
.error button:hover{opacity:.85}

@media(max-width:768px){
  .total-bar{grid-template-columns:repeat(2,1fr)}
  .sentiment-bar{grid-template-columns:repeat(2,1fr)}
  .grid{grid-template-columns:1fr}
  .dash h1{font-size:1.4em}
}
</style>
</head>
<body>
<div class="dash">
  <h1>📊 持仓分析仪表盘</h1>
  <div class="meta">
    <span class="time" id="ut">🔄 加载中...</span>
    <span> · 交易日盘中每30分钟 / 收盘18:00更新</span>
    <a href="/" style="margin-left:8px">← 返回首页</a>
  </div>
  <div id="content"><div class="loading">⏳ 正在加载数据...</div></div>
</div>
<script>
const DATA_URL='/portfolio/data/analysis.json';
const $=id=>document.getElementById(id);
const fmt=n=>'¥'+n.toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPct=(n,show)=>(n>=0?'+':'')+n.toFixed(2)+(show?'%':'');
const scoreColor=s=>s>=75?'var(--green)':s>=60?'var(--blue)':s>=40?'var(--yellow)':'var(--red)';
const scoreLabel=s=>s>=75?'强势看多':s>=60?'偏多':s>=40?'中性':'偏空';
const adviceColor=a=>{if(!a)return'var(--fg3)';if(a.includes('买入')||a.includes('加仓'))return'var(--green)';if(a.includes('卖出')||a.includes('减仓')||a.includes('止损'))return'var(--red)';if(a.includes('观望'))return'var(--yellow)';return'var(--blue)'};

async function load(){
  try{
    const r=await fetch(DATA_URL+'?t='+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    $('ut').textContent='🔄 更新于 '+(d.updated_at||'').replace('T',' ').slice(0,16);
    const pnlCls=d.total_pnl>=0?'green':'red';
    const dayCls=d.total_day_pnl>=0?'green':'red';

    let h=`<div class="total-bar">
      <div class="tb"><div class="l">持仓总额</div><div class="v">${fmt(d.total_market_value)}</div></div>
      <div class="tb"><div class="l">总盈亏</div><div class="v ${pnlCls}">${fmtPct(d.total_pnl)}<br><span style="font-size:.6em">${fmtPct(d.total_pnl_pct,true)}</span></div></div>
      <div class="tb"><div class="l">今日盈亏</div><div class="v small ${dayCls}">${fmtPct(d.total_day_pnl)}<br><span style="font-size:.65em">${fmtPct(d.total_day_pct,true)}</span></div></div>
      <div class="tb"><div class="l">持仓数量</div><div class="v">${d.stocks.length}</div></div>
    </div>`;

    const bulls=d.stocks.filter(s=>s.sentiment_score>=60).length;
    const neutrals=d.stocks.filter(s=>s.sentiment_score>=40&&s.sentiment_score<60).length;
    const bears=d.stocks.filter(s=>s.sentiment_score<40).length;
    h+=`<div class="sentiment-bar">
      <div class="sb"><div class="l">📈 看多</div><div class="v green">${bulls}</div></div>
      <div class="sb"><div class="l">😐 中性</div><div class="v yellow">${neutrals}</div></div>
      <div class="sb"><div class="l">📉 偏空</div><div class="v red">${bears}</div></div>
      <div class="sb"><div class="l">🕐 更新</div><div class="v blue" style="font-size:.8em">${(d.updated_at||'').replace('T',' ').slice(11,16)}</div></div>
    </div><div class="grid">`;

    d.stocks.forEach((s,i)=>{
      const chg=s.pct_chg??0;
      const hasSummary=s.analysis_summary&&s.analysis_summary.length>20;
      h+=`<div class="card">
        <div class="card-top">
          <div><span class="sname">${s.name}</span><span class="scode">${s.code} · ${s.qty}股</span></div>
          <div class="score" style="border-color:${scoreColor(s.sentiment_score)};color:${scoreColor(s.sentiment_score)}">
            <div class="num">${s.sentiment_score}</div><div class="lbl">${scoreLabel(s.sentiment_score)}</div>
          </div>
        </div>
        <div class="price-row">
          <span class="p">${fmt(s.price)}</span>
          <span class="chg ${chg>=0?'up':'down'}">${fmtPct(chg,true)}</span>
          <span class="mv">市值 ${fmt(s.market_value)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--fg3);margin-bottom:10px">
          <span>成本 ${fmt(s.cost)}</span>
          <span class="${s.pnl>=0?'green':'red'}">盈亏 ${fmtPct(s.pnl)} (${fmtPct(s.pnl_pct,true)})</span>
        </div>
        <div class="advice" style="border-color:${adviceColor(s.operation_advice)};color:${adviceColor(s.operation_advice)}">${s.operation_advice||'暂无建议'}</div>
        <div class="prices">
          <div class="pi"><span class="l">买入价</span><span class="v">${fmt(s.ideal_buy)}</span></div>
          <div class="pi"><span class="l">止损价</span><span class="v red">${fmt(s.stop_loss)}</span></div>
          <div class="pi"><span class="l">目标价</span><span class="v green">${fmt(s.take_profit)}</span></div>
        </div>
        ${hasSummary?`<div class="summary-wrap">
          <button class="summary-toggle" onclick="toggleSummary(${i})">
            <span class="arrow">▶</span> AI 分析摘要
          </button>
          <div class="summary-body" id="sum-${i}">
            <div class="inner">${s.analysis_summary}</div>
          </div>
        </div>`:''}
        <div class="ts">${s.trend_prediction||''} · ${(s.analyzed_at||'').replace('T',' ').slice(0,16)}</div>
      </div>`;
    });
    h+='</div>';
    $('content').innerHTML=h;
  }catch(e){
    $('content').innerHTML=`<div class="error">❌ 加载失败: ${e.message}<br><button onclick="load()">重试</button></div>`;
  }
}
function toggleSummary(i){
  const el=document.getElementById('sum-'+i);
  const btn=el.previousElementSibling;
  el.classList.toggle('open');
  btn.classList.toggle('open');
}
load();
</script>
</body>
</html>
