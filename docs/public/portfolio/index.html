<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>持仓分析仪表盘 - AI Learning Path</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--fg); --bg: #0d1117; --bg2: #161b22; --bg3: #21262d; --fg: #e6edf3; --fg2: #8b949e; --fg3: #484f58; --border: #30363d; --green: #3fb950; --red: #f85149; --yellow: #d29922; --blue: #58a6ff; }
@media (prefers-color-scheme: light) { body { --bg: #fff; --bg2: #f6f8fa; --bg3: #eaeef2; --fg: #1f2328; --fg2: #656d76; --fg3: #8b949e; --border: #d0d7de; } }
.dash { max-width: 1200px; margin: 0 auto; padding: 32px 24px 64px; }
.dash h1 { text-align: center; font-size: 2em; margin-bottom: 8px; }
.dash .meta { text-align: center; color: var(--fg3); font-size: 14px; margin-bottom: 32px; }
.dash .meta .time { color: var(--blue); font-weight: 600; }
.overview { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 32px; }
.ov { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
.ov .label { font-size: 13px; color: var(--fg3); margin-bottom: 8px; }
.ov .val { font-size: 2em; font-weight: 800; }
.green { color: var(--green); } .yellow { color: var(--yellow); } .red { color: var(--red); } .blue { color: var(--blue); }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 20px; }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 20px; transition: transform 0.2s, box-shadow 0.2s; }
.card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
.card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.sname { font-size: 16px; font-weight: 700; display: block; }
.scode { font-size: 12px; color: var(--fg3); }
.score { text-align: center; padding: 8px 16px; border: 2px solid; border-radius: 12px; min-width: 72px; }
.score .num { font-size: 24px; font-weight: 800; line-height: 1.2; }
.score .lbl { font-size: 11px; opacity: 0.8; }
.price-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--bg3); border-radius: 8px; margin-bottom: 12px; }
.price-bar .p { font-size: 20px; font-weight: 700; }
.price-bar .chg { font-size: 14px; font-weight: 600; }
.up { color: var(--green); } .down { color: var(--red); }
.advice { padding: 8px 14px; border-left: 4px solid; border-radius: 0 8px 8px 0; font-weight: 700; font-size: 15px; margin-bottom: 12px; }
.prices { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
.pi { text-align: center; padding: 8px 4px; background: var(--bg3); border-radius: 8px; }
.pi .l { font-size: 11px; color: var(--fg3); display: block; }
.pi .v { font-size: 14px; font-weight: 700; }
.summary { font-size: 13px; color: var(--fg2); line-height: 1.6; padding: 10px 12px; background: var(--bg3); border-radius: 8px; margin-bottom: 8px; max-height: 120px; overflow-y: auto; }
.card .time { font-size: 11px; color: var(--fg3); text-align: right; }
.loading, .error { text-align: center; padding: 64px; color: var(--fg2); }
.error button { margin-top: 12px; padding: 8px 20px; background: var(--blue); color: #fff; border: none; border-radius: 8px; cursor: pointer; }
@media (max-width: 768px) { .overview { grid-template-columns: repeat(2,1fr); } .grid { grid-template-columns: 1fr; } .dash h1 { font-size: 1.4em; } }
</style>
</head>
<body>
<div class="dash">
  <h1>📊 持仓分析仪表盘</h1>
  <div class="meta">
    <span class="time" id="ut">🔄 加载中...</span>
    <span> · 交易日每30分钟更新</span>
    <a href="/" style="color:var(--blue);margin-left:8px">← 返回首页</a>
  </div>
  <div id="content"><div class="loading">⏳ 正在加载数据...</div></div>
</div>
<script>
const DATA_URL = '/portfolio/data/analysis.json';
const $ = id => document.getElementById(id);
const scoreColor = s => s >= 75 ? 'var(--green)' : s >= 60 ? 'var(--blue)' : s >= 40 ? 'var(--yellow)' : 'var(--red)';
const scoreLabel = s => s >= 75 ? '强势看多' : s >= 60 ? '偏多' : s >= 40 ? '中性' : '偏空';
const adviceColor = a => {
  if (!a) return 'var(--fg3)';
  if (a.includes('买入') || a.includes('加仓')) return 'var(--green)';
  if (a.includes('卖出') || a.includes('减仓') || a.includes('止损')) return 'var(--red)';
  if (a.includes('观望')) return 'var(--yellow)';
  return 'var(--blue)';
};
async function load() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    $('ut').textContent = '🔄 更新于 ' + (d.updated_at || '').replace('T',' ').slice(0,16);
    const bulls = d.stocks.filter(s => s.sentiment_score >= 60).length;
    const neutrals = d.stocks.filter(s => s.sentiment_score >= 40 && s.sentiment_score < 60).length;
    const bears = d.stocks.filter(s => s.sentiment_score < 40).length;
    let html = `<div class="overview">
      <div class="ov"><div class="label">持仓数量</div><div class="val">${d.stocks.length}</div></div>
      <div class="ov"><div class="label">看多</div><div class="val green">${bulls}</div></div>
      <div class="ov"><div class="label">中性</div><div class="val yellow">${neutrals}</div></div>
      <div class="ov"><div class="label">偏空</div><div class="val red">${bears}</div></div>
    </div><div class="grid">`;
    d.stocks.forEach(s => {
      const chg = s.pct_chg ?? 0;
      html += `<div class="card">
        <div class="card-top">
          <div><span class="sname">${s.name}</span><span class="scode">${s.code}</span></div>
          <div class="score" style="border-color:${scoreColor(s.sentiment_score)};color:${scoreColor(s.sentiment_score)}">
            <div class="num">${s.sentiment_score}</div><div class="lbl">${scoreLabel(s.sentiment_score)}</div>
          </div>
        </div>
        <div class="price-bar">
          <span class="p">¥${s.price?.toFixed(3)||'-'}</span>
          <span class="chg ${chg>=0?'up':'down'}">${chg>=0?'+':''}${chg.toFixed(2)}%</span>
        </div>
        <div class="advice" style="border-color:${adviceColor(s.operation_advice)};color:${adviceColor(s.operation_advice)}">${s.operation_advice||'暂无建议'}</div>
        <div class="prices">
          <div class="pi"><span class="l">买入价</span><span class="v">¥${s.ideal_buy?.toFixed(2)||'-'}</span></div>
          <div class="pi"><span class="l">止损价</span><span class="v red">¥${s.stop_loss?.toFixed(2)||'-'}</span></div>
          <div class="pi"><span class="l">目标价</span><span class="v green">¥${s.take_profit?.toFixed(2)||'-'}</span></div>
        </div>
        ${s.analysis_summary ? `<div class="summary">${s.analysis_summary}</div>` : ''}
        <div class="time">分析于 ${(s.analyzed_at||'').replace('T',' ').slice(0,16)}</div>
      </div>`;
    });
    html += '</div>';
    $('content').innerHTML = html;
  } catch(e) {
    $('content').innerHTML = `<div class="error">❌ 加载失败: ${e.message}<br><button onclick="load()">重试</button></div>`;
  }
}
load();
</script>
</body>
</html>
